<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#FFFFFF">
  <title>로또 번호 추천</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header" role="banner">
    <div class="header-inner">
      <div class="logo-wrap" aria-label="lotto">
        <span class="logo-icon" aria-hidden="true"></span>
        <span class="logo">lotto</span>
      </div>
    </div>
  </header>

  <main class="main">
    <section class="hero" aria-label="메인">
      <div class="hero-highlight">
        <span class="hero-highlight-icon" aria-hidden="true">✦</span>
        <span class="hero-highlight-text">무료 번호 추천</span>
      </div>
      <h2 class="hero-subtitle">
        로또 번호 추천으로<br>
        오늘의 행운을 뽑아보세요.
      </h2>
      <p class="hero-desc">
        1~45 중 6개 번호와 보너스 1개를 무작위로 추천해 드립니다.
      </p>

      <div class="controls">
        <label for="count">추천 세트</label>
        <select id="count" aria-label="추천 세트 수">
          <option value="1">1세트</option>
          <option value="3">3세트</option>
          <option value="5" selected>5세트</option>
          <option value="10">10세트</option>
        </select>
        <button type="button" class="btn" id="generateBtn">번호 추천받기</button>
      </div>
    </section>

    <section class="results-wrap" aria-label="추천 결과">
      <div class="results" id="results" aria-live="polite"></div>
    </section>
  </main>

  <footer class="footer">
    <p>참고용이며, 당첨을 보장하지 않습니다. 재미로만 이용해 주세요.</p>
  </footer>
  <script src="script.js"></script>
</body>
</html>
